services:
  qwen-vlm:
    build: ./qwen-server
    container_name: qwen-vlm
    restart: unless-stopped
    ports:
      - 8000:8000
    env_file:
      - ./qwen-server/.env
    volumes:
      - ./qwen-server/models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-net

  dbhub:
    image: bytebase/dbhub:latest
    container_name: dbhub
    command:
      - --transport
      - http
      - --port
      - "8080"
      - --config
      - /workspace/dbhub.toml
    ports:
      - "8080:8080"
    volumes:
      - ./mcps/db-server/dbhub.toml:/workspace/dbhub.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge