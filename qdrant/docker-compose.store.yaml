services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

    healthcheck:
      test:
        ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  qdrant-mcp:
    build:
      context: .
      dockerfile: ./Dockerfile.mcp.qdrant
    container_name: mcp-server-qdrant
    command: ["python", "-m", "mcp_server_qdrant"]
    ports:
      - "9633:9633"
    volumes:
      - ./models:/app/models
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=1
      - FASTMCP_SERVER_HOST=0.0.0.0
      - FASTMCP_SERVER_PORT=9633
      # - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - FASTEMBED_CACHE_PATH="/app/models"

      # - EMBEDDING_PROVIDER=fastembed

    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
