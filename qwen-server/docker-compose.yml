services:
  qwen-vlm:
    build: .
    container_name: qwen-vlm
    restart: unless-stopped
    ports:
      - 9000:9000
    env_file:
      - .env
    volumes:
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
